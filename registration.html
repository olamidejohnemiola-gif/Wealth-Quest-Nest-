<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WQN Registration</title>

<style>

/* ========================= */
/* 🌍 RESET */
/* ========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  min-height:100%;
  font-family:Arial, sans-serif;
  color:white;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* ========================= */
/* 🌌 FULL BACKGROUND */
/* ========================= */

.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url("bg.png") no-repeat center center;
  background-size:cover;
  filter:brightness(0.75) contrast(1.1);
  z-index:-4;
}

/* ========================= */
/* 🌫 DARK OVERLAY */
/* ========================= */

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-3;
}

/* ========================= */
/* ✨ MOVING GLOW */
/* ========================= */

.glow{
  position:fixed;
  width:350px;
  height:350px;
  background:radial-gradient(circle, gold, transparent 70%);
  filter:blur(90px);
  animation:moveGlow 8s infinite alternate ease-in-out;
  z-index:-2;
}

@keyframes moveGlow{

  0%{
    top:5%;
    left:5%;
  }

  100%{
    top:65%;
    left:70%;
  }

}

/* ========================= */
/* ✨ FLOATING PARTICLES */
/* ========================= */

.sparkle{
  position:fixed;
  color:gold;
  font-size:18px;
  animation:sparkleFloat 6s linear infinite;
  opacity:0.8;
  z-index:-1;
}

.sparkle:nth-child(1){
  left:10%;
  animation-delay:0s;
}

.sparkle:nth-child(2){
  left:40%;
  animation-delay:2s;
}

.sparkle:nth-child(3){
  left:70%;
  animation-delay:4s;
}

@keyframes sparkleFloat{

  0%{
    transform:translateY(100vh) scale(0.5);
    opacity:0;
  }

  50%{
    opacity:1;
  }

  100%{
    transform:translateY(-20vh) scale(1.2);
    opacity:0;
  }

}

/* ========================= */
/* 📦 MAIN CONTAINER */
/* ========================= */

.container{
  position:relative;
  max-width:550px;
  margin:60px auto;
  padding:35px;
  border-radius:25px;

  background:rgba(255,255,255,0.06);

  backdrop-filter:blur(15px);

  border:1px solid rgba(255,215,0,0.25);

  box-shadow:
  0 0 25px rgba(255,215,0,0.2),
  0 0 60px rgba(255,215,0,0.08);

  animation:floatContainer 5s ease-in-out infinite;
}

/* FLOAT */
@keyframes floatContainer{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-8px);
  }

  100%{
    transform:translateY(0px);
  }

}

/* ========================= */
/* ✨ CONTAINER SPARKLES */
/* ========================= */

.container::before,
.container::after{
  content:"✨";
  position:absolute;
  font-size:22px;
  animation:twinkle 2s infinite;
}

.container::before{
  top:-12px;
  left:20px;
}

.container::after{
  bottom:-12px;
  right:20px;
}

@keyframes twinkle{

  0%{
    opacity:0.3;
    transform:scale(0.8);
  }

  50%{
    opacity:1;
    transform:scale(1.3);
  }

  100%{
    opacity:0.3;
    transform:scale(0.8);
  }

}

/* ========================= */
/* 🔄 LOGO */
/* ========================= */

.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:50%;

  border:2px solid gold;

  box-shadow:
  0 0 20px gold,
  0 0 40px rgba(255,215,0,0.3);

  animation:rotateLogo 7s linear infinite;
}

@keyframes rotateLogo{

  0%{
    transform:rotateY(0deg);
  }

  100%{
    transform:rotateY(360deg);
  }

}

/* ========================= */
/* 🏆 TITLE */
/* ========================= */

h2{
  text-align:center;
  color:gold;
  margin-bottom:10px;
  font-size:2rem;
  text-shadow:0 0 15px gold;
}

.subtitle{
  text-align:center;
  color:#ccc;
  margin-bottom:30px;
  line-height:1.6;
}

/* ========================= */
/* 🖊 INPUTS */
/* ========================= */

input,
select{
  width:100%;
  padding:15px;
  margin-bottom:18px;

  border:none;
  outline:none;

  border-radius:12px;

  background:rgba(255,255,255,0.08);

  color:white;
  font-size:1rem;

  border:1px solid rgba(255,215,0,0.15);

  transition:0.3s ease;
}

/* INPUT FOCUS */

input:focus,
select:focus{

  border:1px solid gold;

  box-shadow:0 0 20px rgba(255,215,0,0.3);

}

/* PLACEHOLDER */

input::placeholder{
  color:#ddd;
}

/* SELECT OPTION */

select option{
  color:black;
}

/* ========================= */
/* 🚀 BUTTON */
/* ========================= */

button{
  width:100%;
  padding:15px;

  border:none;
  border-radius:12px;

  background:linear-gradient(45deg,gold,#ffd60a);

  color:black;
  font-size:1rem;
  font-weight:bold;

  cursor:pointer;

  transition:0.3s ease;
}

/* BUTTON HOVER */

button:hover{

  transform:scale(1.04);

  box-shadow:
  0 0 20px gold,
  0 0 40px rgba(255,215,0,0.3);

}

/* ========================= */
/* ✅ SUCCESS MESSAGE */
/* ========================= */

#registration-success{
  display:none;

  margin-top:20px;

  text-align:center;

  color:gold;

  font-weight:bold;

  animation:glowSuccess 1.5s infinite;
}

@keyframes glowSuccess{

  0%{
    opacity:0.5;
    text-shadow:0 0 5px gold;
  }

  50%{
    opacity:1;
    text-shadow:0 0 20px gold;
  }

  100%{
    opacity:0.5;
    text-shadow:0 0 5px gold;
  }

}

/* ========================= */
/* 📱 MOBILE */
/* ========================= */

@media(max-width:768px){

  .container{
    margin:30px 15px;
    padding:25px;
  }

  h2{
    font-size:1.7rem;
  }

}

</style>

</head>

<body>

<!-- 🌌 BACKGROUND -->
<div class="bg"></div>

<!-- 🌫 OVERLAY -->
<div class="overlay"></div>

<!-- ✨ GLOW -->
<div class="glow"></div>

<!-- ✨ PARTICLES -->
<div class="sparkle">✨</div>
<div class="sparkle">✨</div>
<div class="sparkle">✨</div>

<!-- 📦 CONTAINER -->
<div class="container">

  <!-- 🔄 LOGO -->
  <div class="logo">
    <img src="image3.jpg" alt="WQN Logo">
  </div>

  <!-- 🏆 TITLE -->
  <h2>WEALTH QUEST NEST ACADEMY</h2>

  <p class="subtitle">
    Register now and start learning premium digital skills with Wealth Quest Nest.
  </p>

  <!-- 📄 FORM -->
  <form id="registration-form">

    <input type="text"
           name="fullname"
           placeholder="Full Name"
           required>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

    <input type="tel"
           name="phone"
           placeholder="Phone Number"
           required>

    <select name="course" required>

      <option value="">Select Course</option>

      <option>Graphic Design Masterclass</option>

      <option>Canva Design Training</option>

      <option>Flyer Design Course</option>

      <option>Social Media Branding Course</option>

      <option>Website Design Course</option>

      <option>Presentation Video Training</option>

      <option>AI Prompt Engineering</option>

      <option>AI Image Generation & Art</option>

      <option>Web Development Basics</option>

    </select>

    <button type="submit">
      REGISTER NOW
    </button>

    <!-- ✅ SUCCESS -->
    <div id="registration-success">
      ✅ Registration Successful! Redirecting to homepage...
    </div>

  </form>

</div>

<!-- ========================= -->
<!-- 🚀 FORM SCRIPT -->
<!-- ========================= -->

<script>

const registrationForm =
document.getElementById('registration-form');

registrationForm.addEventListener(

'submit',

async function(e){

e.preventDefault();

const formData =
new FormData(registrationForm);

const response =
await fetch(

'https://formspree.io/f/xkgvqwow',

{
  method:'POST',

  body:formData,

  headers:{
    'Accept':'application/json'
  }

}

);

if(response.ok){

  // SHOW SUCCESS MESSAGE

  document.getElementById(
  'registration-success'
  ).style.display = 'block';

  // RESET FORM

  registrationForm.reset();

  // REDIRECT HOME

  setTimeout(() => {

    window.location.href =
    "index.html";

  },3000);

}else{

  alert(
  '❌ Something went wrong. Please try again.'
  );

}

}

);

</script>

</body>
</html>
